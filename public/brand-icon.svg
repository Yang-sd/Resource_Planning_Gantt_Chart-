<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="baseGlow" x1="128" y1="18" x2="128" y2="238" gradientUnits="userSpaceOnUse">
