services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://resource_planning:resource_planning@mysql:3306/resource_planning?charset=utf8mb4
      APP_TIMEZONE: Asia/Shanghai
    ports:
      - '8000:8000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: resource_planning
      MYSQL_USER: resource_planning
      MYSQL_PASSWORD: resource_planning
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -proot']
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
